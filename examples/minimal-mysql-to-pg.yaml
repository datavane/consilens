# 快速上手配置 - MySQL 到 PostgreSQL 基本比对
# 最小化配置示例，适合首次使用

source:
  type: mysql
  name: source-mysql
  connection:
    url: jdbc:mysql://localhost:3306/mydb
    username: ${env.MYSQL_USER}
    password: ${env.MYSQL_PASSWORD}
  resource:
    type: table
    name: users

target:
  type: postgresql
  name: target-postgresql
  connection:
    url: jdbc:postgresql://localhost:5432/mydb
    username: ${env.PG_USER}
    password: ${env.PG_PASSWORD}
  resource:
    type: table
    name: users

comparison:
  keys:
    source:
      - id
    target:
      - id

  fields:
    source:
      - name
      - email
      - status
    target:
      - name
      - email
      - status

strategy:
  mode: checksum
  algorithm: xor
  bisectionFactor: 4
  bisectionThreshold: 5000

result:
  sinks:
    - format: console
      type: result
