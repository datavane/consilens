# 大表高并发比对配置 - MySQL 到 StarRocks
# 适用于百万级以上数据量的跨库比对，优化了并发和分片参数

source:
  type: mysql
  name: source-mysql
  connection:
    url: jdbc:mysql://source-host:3306/production
    username: ${env.MYSQL_USER}
    password: ${env.MYSQL_PASSWORD}
  resource:
    type: table
    name: fact_orders

target:
  type: starrocks
  name: target-starrocks
  connection:
    url: jdbc:mysql://starrocks-host:9030/analytics
    username: ${env.STARROCKS_USER}
    password: ${env.STARROCKS_PASSWORD}
  resource:
    type: table
    name: fact_orders

comparison:
  keys:
    source:
      - order_id
    target:
      - order_id

  fields:
    source:
      - customer_id
      - product_id
      - quantity
      - unit_price
      - total_amount
      - order_date
      - status
    target:
      - customer_id
      - product_id
      - quantity
      - unit_price
      - total_amount
      - order_date
      - status

strategy:
  mode: checksum
  algorithm: xor
  bisectionFactor: 8
  bisectionThreshold: 8000
  batchSize: 2000
  enableProfiling: true

concurrency:
  io:
    core: 8
    max: 32
    queueSize: 10000
    keepAliveSeconds: 60
  cpu:
    core: 4
    max: 8
    queueSize: 5000
    keepAliveSeconds: 60

result:
  sinks:
    - format: console
      type: result
    - format: table
      type: diff-record
      properties:
        url: jdbc:mysql://localhost:3306/diff_results
        username: ${env.MYSQL_USER}
        password: ${env.MYSQL_PASSWORD}
        driver: com.mysql.cj.jdbc.Driver
        maxPoolSize: 10
        prefix: diff_
        suffixTimestamp: true
        createTable: true
        batchSize: 1000
