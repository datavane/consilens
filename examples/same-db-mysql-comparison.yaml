# 同库比对配置 - MySQL 内部两张表比对
# 适用于数据迁移验证、分表一致性校验等场景

source:
  type: mysql
  name: source-mysql
  connection:
    url: jdbc:mysql://localhost:3306/mydb
    username: ${env.MYSQL_USER}
    password: ${env.MYSQL_PASSWORD}
  resource:
    type: table
    name: orders

target:
  type: mysql
  name: target-mysql
  connection:
    url: jdbc:mysql://localhost:3306/mydb
    username: ${env.MYSQL_USER}
    password: ${env.MYSQL_PASSWORD}
  resource:
    type: table
    name: orders_backup

comparison:
  keys:
    source:
      - order_id
    target:
      - order_id

  fields:
    source:
      - customer_id
      - amount
      - status
      - created_at
    target:
      - customer_id
      - amount
      - status
      - created_at

  filters:
    source: "created_at >= '2025-01-01'"
    target: "created_at >= '2025-01-01'"

strategy:
  mode: checksum
  algorithm: xor
  bisectionFactor: 4
  bisectionThreshold: 10000

result:
  sinks:
    - format: console
      type: result
