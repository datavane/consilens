# 实时长驻比对配置 - MySQL 表 vs PostgreSQL 表
# 启动方式：./consilens diff --config examples/realtime-table-mysql-vs-postgres-loop.yaml --realtime-loop
# 目标：按 updated_at 滚动窗口持续比对，checkpoint 持久化到 PostgreSQL 表。

source:
  type: mysql
  name: source-mysql-realtime
  connection:
    url: jdbc:mysql://localhost:3306/test
    username: ${env.MYSQL_USER}
    password: ${env.MYSQL_PASSWORD}
  resource:
    type: table
    name: performance_test_table

target:
  type: postgresql
  name: target-postgresql-realtime
  connection:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=public
    username: ${env.PG_USER}
    password: ${env.PG_PASSWORD}
  resource:
    type: table
    name: performance_test_table

comparison:
  keys:
    source:
      - record_id
    target:
      - record_id

  fields:
    source:
      - col_int
      - col_decimal
      - amount
      - status
      - updated_at
    target:
      - col_int
      - col_decimal
      - amount
      - status
      - updated_at

  filters:
    source: "created_at >= '2026-01-01 00:00:00'"
    target: "created_at >= '2026-01-01 00:00:00'"

realtime:
  enabled: true
  updateColumns:
    source: updated_at
    target: updated_at
  watermarkDelay: PT5M
  windowSize: PT10M
  overlap: PT30M
  interval: PT1M
  checkpointStore:
    type: table
    name: consilens_compare_checkpoint
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=public
    username: ${env.PG_USER}
    password: ${env.PG_PASSWORD}
    driver: org.postgresql.Driver

strategy:
  mode: checksum
  algorithm: xor
  bisectionFactor: 8
  bisectionThreshold: 8000
  batchSize: 1000
  enableProfiling: true

result:
  sinks:
    - format: console
      type: result
