source:
  type: mysql
  name: source-mysql
  connection:
    url: jdbc:mysql://localhost:3306/consilens_demo
    username: ${env.MYSQL_USER}
    password: ${env.MYSQL_PASSWORD}
  resource:
    type: table
    name: consilens_performance_demo_table

target:
  type: starrocks
  name: target-starrocks
  connection:
    url: jdbc:mysql://localhost:9030/consilens_demo
    username: ${env.STARROCKS_USER}
    password: ${env.STARROCKS_PASSWORD}
  resource:
    type: table
    name: consilens_performance_demo_table

comparison:
  keys:
    source:
      - record_id
    target:
      - record_id

  fields:
    source:
      - col_tinyint
      - col_smallint
      - col_mediumint
      - col_int
      - col_bigint
      - col_unsigned_int
    target:
      - col_tinyint
      - col_smallint
      - col_mediumint
      - col_int
      - col_bigint
      - col_unsigned_int

  # filters:
  #   source: "record_id >= 'REC0000000000' AND record_id <= 'REC0000009094'"
  #   target: "record_id >= 'REC0000000000' AND record_id <= 'REC0000009094'"

strategy:
  mode: checksum
  algorithm: xor
  bisectionFactor: 8
  bisectionThreshold: 5000

result:
  sinks:
    - format: console
      type: result
    - format: json
      type: diff-record
      properties:
        path: ./performance_test_diff.json
        pretty: false
