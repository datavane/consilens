name: CI

on:
  push:
    branches:
      - dev
      - main
    paths:
      - '.github/workflows/ci.yml'
      - 'consilens-cli/**'
      - 'consilens-common/**'
      - 'consilens-connector/**'
      - 'consilens-core/**'
      - 'consilens-performance/**'
      - 'consilens-spi/**'
      - 'consilens-dist/**'
      - 'pom.xml'
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  paths-filter:
    name: CI-Path-Filter
    runs-on: ubuntu-latest
    outputs:
      not-ignore: true
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@b2feaf19c27470162a626bd6fa8438ae5b263721
        id: filter
        with:
          filters: |
            not-ignore:
              - '!(docs/**)'

  build:
    name: CI-Build
    needs: paths-filter
    if: ${{ (needs.paths-filter.outputs.not-ignore == 'true') || (github.event_name == 'push') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '11' ]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v2
        with:
          java-version: ${{ matrix.java }}
          distribution: 'adopt'
      - uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven
      - name: Build and Package on ${{ matrix.java }}
        run: |
          chmod 777 ./mvnw
          ./mvnw -B clean package -DskipTests -DskipITs \
                 -Dspotless.skip=true \

  result:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ build, paths-filter ]
    if: always()
    steps:
      - name: Status
        run: |
          if [[ '${{ needs.paths-filter.outputs.not-ignore }}' == 'false' && '${{ github.event_name }}' == 'pull_request' ]]; then
            echo "Skip Build!"
            exit 0
          fi
          if [[ '${{ needs.build.result }}' != 'success' ]]; then
            echo "Build Failed!"
            exit 1
          fi
